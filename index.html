<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Recorder Notes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">

        <!-- Header / Controls -->
        <header>
            <div class="title">Learn Recorder Notes</div>
            <div class="controls">
                <div class="switch-group">
                    <label>Instrument</label>
                    <div class="toggle-pill">
                        <button id="btn-soprano" class="active">Soprano</button>
                        <button id="btn-alto">Alto</button>
                        <button id="btn-bass">Bass</button>
                    </div>
                </div>

                <div class="switch-group" style="position:relative;">
                    <label>Mode</label>
                    <div class="toggle-pill">
                        <button id="btn-explore" class="active">Explore</button>
                        <button id="btn-quiz">Quiz</button>
                    </div>
                    <div id="quiz-hint" class="hidden" style="position:absolute; top: 100%; left: 0; width: 100%; text-align: center; font-size: 0.7rem; color: #ff9800; margin-top: 4px;">Click Explore to stop the quiz.</div>
                </div>
            </div>
        </header>

        <!-- Main Workspace -->
        <main>
            <!-- Left: Staff Display -->
            <div class="panel staff-panel">
                <div id="quiz-message" class="quiz-feedback hidden">Find: C5</div>
                <div class="staff-container" id="staff-container">
                    <!-- SVG Staff injected here -->
                </div>
            </div>

            <!-- Right: 3D Recorder Display -->
            <div class="panel recorder-panel">
                <div class="recorder-wrapper">
                    <!-- Recorder SVG -->
                    <div id="recorder-visual" class="recorder-visual"></div>
                </div>
            </div>
        </main>

        <!-- Bottom: Keyboard Bank -->
        <footer>
            <div class="bank-wrapper">
                <div id="note-bank" class="note-bank">
                    <!-- Javascript will populate buttons here -->
                </div>
                <!-- Advanced Toggle -->
                <div id="difficulty-selector-container" class="hidden">
                    <label>Quiz Level</label>
                    <div class="toggle-pill diff-pill">
                        <button id="btn-lvl-1" class="active">I</button>
                        <button id="btn-lvl-2">II</button>
                        <button id="btn-lvl-3">III</button>
                    </div>
                </div>
            </div>
        </footer>

    </div>

    <script src="fingerings.js"></script>
    <script src="audio.js"></script>
    <script src="script.js"></script>
</body>

</html>
